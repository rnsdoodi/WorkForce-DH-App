{% extends "base.html" %}
{% block content %}

<link rel="icon" type="image/x-icon" href="/static/assets/favicon2.ico" />

<style>
    :root {
        --primary: #0aa39a;
        --primary-dark: #087f78;
    }

    body {
        background: linear-gradient(135deg, #0aa39a, #065f5b);
        font-family: 'Cairo', sans-serif;
    }

    .register-container {
        min-height: 90vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
    }

    .register-card {
        background: white;
        padding: 50px 45px;
        border-radius: 35px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 500px;
        animation: fadeInUp 0.6s ease;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .logo-circle {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #0aa39a, #087f78);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        box-shadow: 0 10px 30px rgba(10,163,154,0.4);
    }

    .logo-circle i {
        font-size: 40px;
        color: white;
    }

    .register-card h1 {
        text-align: center;
        font-weight: 800;
        margin-bottom: 10px;
        color: #1f2d3d;
    }

    .subtitle {
        text-align: center;
        color: #6c757d;
        font-size: 14px;
        margin-bottom: 30px;
    }

    /* Flash Messages */
    .flash-message {
        padding: 12px 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        text-align: center;
        background: linear-gradient(135deg, #d4edda, #c3e6cb);
        color: #155724;
        border-right: 4px solid #28a745;
    }

    /* Form */
    .register-card input {
        width: 100%;
        padding: 14px 20px;
        border: 2px solid #e1e8ed;
        border-radius: 12px;
        font-size: 16px;
        transition: all 0.3s ease;
        margin-bottom: 15px;
    }

    .register-card input:focus {
        outline: none;
        border-color: #0aa39a;
        box-shadow: 0 0 0 4px rgba(10,163,154,0.1);
    }

    .btn-custom {
        width: 100%;
        padding: 14px;
        font-size: 18px;
        font-weight: 700;
        border-radius: 12px;
        background: linear-gradient(135deg, #0aa39a, #087f78);
        border: none;
        color: white;
        margin-top: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-custom:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(10,163,154,0.4);
    }

    .login-link {
        text-align: center;
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid #e9ecef;
    }

    .login-link a {
        color: #0aa39a;
        text-decoration: none;
        font-weight: 700;
    }

    .login-link a:hover {
        color: #087f78;
    }

    @media (max-width: 576px) {
        .register-card {
            padding: 35px 25px;
        }

        .logo-circle {
            width: 65px;
            height: 65px;
        }

        .logo-circle i {
            font-size: 32px;
        }

        .register-card h1 {
            font-size: 24px;
        }
    }
</style>

<div class="register-container">
    <div class="register-card">
        <div class="logo-circle">
            <i class="fas fa-user-plus"></i>
        </div>

        <h1>تسجيل حساب جديد</h1>
        <div class="subtitle">انضم إلى Workforce Saudia</div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-message">
                        <i class="fas fa-check-circle"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('register') }}" method="post">
            <input type="text" name="name" placeholder="الاسم الكامل" required="required" />
            <input type="email" name="email" placeholder="البريد الإلكتروني" required="required" />
            <input type="password" name="password" placeholder="كلمة المرور" required="required" />
            <button type="submit" class="btn-custom">
                <i class="fas fa-user-check"></i> تسجيل
            </button>
        </form>

        <div class="login-link">
            <p>لديك حساب بالفعل؟ <a href="{{ url_for('login') }}">تسجيل الدخول</a></p>
        </div>
    </div>
</div>

{% endblock %}
