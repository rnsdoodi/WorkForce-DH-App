{% extends "base.html" %}
{% block content %}

<link rel="icon" type="image/x-icon" href="/static/assets/favicon2.ico" />

<style>
    :root {
        --primary: #0aa39a;
        --primary-dark: #087f78;
        --primary-light: #7ed6c9;
        --dark: #1f2d3d;
    }

    body {
        background: linear-gradient(135deg, #0aa39a, #065f5b);
        font-family: 'Cairo', sans-serif;
        position: relative;
    }

    /* خلفية مزخرفة */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="40" r="3" fill="rgba(255,255,255,0.1)"/><circle cx="50" cy="80" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="90" cy="90" r="1.5" fill="rgba(255,255,255,0.1)"/></svg>');
        background-repeat: repeat;
        opacity: 0.5;
        pointer-events: none;
    }

    .dashboard-container {
        min-height: 90vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        position: relative;
        z-index: 1;
    }

    .dashboard-card {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(10px);
        padding: 50px 45px;
        border-radius: 35px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        text-align: center;
        width: 100%;
        max-width: 500px;
        transition: all 0.3s ease;
        border: 1px solid rgba(10,163,154,0.2);
        animation: fadeInUp 0.6s ease;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .dashboard-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 35px 70px rgba(0, 0, 0, 0.25);
    }

    .logo-wrapper {
        margin-bottom: 25px;
    }

    .logo-circle {
        width: 90px;
        height: 90px;
        background: linear-gradient(135deg, #0aa39a, #087f78);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
        box-shadow: 0 10px 30px rgba(10,163,154,0.4);
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% {
            box-shadow: 0 0 0 0 rgba(10,163,154,0.4);
        }
        70% {
            box-shadow: 0 0 0 15px rgba(10,163,154,0);
        }
        100% {
            box-shadow: 0 0 0 0 rgba(10,163,154,0);
        }
    }

    .logo-circle i {
        font-size: 45px;
        color: white;
    }

    .dashboard-card h1 {
        font-weight: 800;
        margin-bottom: 10px;
        font-size: 28px;
        letter-spacing: -0.5px;
    }

    .gradient-text {
        background: linear-gradient(135deg, #0aa39a, #087f78);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .subtitle {
        color: #6c757d;
        font-size: 14px;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .subtitle i {
        color: #0aa39a;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        margin: 30px 0;
    }

    .stat-item {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 15px;
        transition: all 0.3s ease;
    }

    .stat-item:hover {
        background: #f0f0f0;
        transform: translateY(-2px);
    }

    .stat-number {
        font-size: 24px;
        font-weight: 800;
        color: #0aa39a;
        display: block;
    }

    .stat-label {
        font-size: 12px;
        color: #6c757d;
        margin-top: 5px;
    }

    .btn-custom {
        padding: 15px 25px;
        font-size: 18px;
        font-weight: 700;
        border-radius: 15px;
        transition: all 0.3s ease;
        background: linear-gradient(135deg, #0aa39a, #087f78);
        border: none;
        color: white;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-top: 20px;
        position: relative;
        overflow: hidden;
    }

    .btn-custom::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }

    .btn-custom:hover::before {
        width: 300px;
        height: 300px;
    }

    .btn-custom i {
        font-size: 20px;
        transition: transform 0.3s ease;
        position: relative;
        z-index: 1;
    }

    .btn-custom span {
        position: relative;
        z-index: 1;
    }

    .btn-custom:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(10,163,154,0.5);
    }

    .btn-custom:hover i {
        transform: translateX(-5px);
    }

    .security-badge {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid #e9ecef;
        display: flex;
        justify-content: center;
        gap: 20px;
        color: #6c757d;
        font-size: 12px;
    }

    .security-badge i {
        color: #0aa39a;
        margin-left: 5px;
    }

    @media (max-width: 576px) {
        .dashboard-card {
            padding: 35px 25px;
        }

        .logo-circle {
            width: 70px;
            height: 70px;
        }

        .logo-circle i {
            font-size: 35px;
        }

        .dashboard-card h1 {
            font-size: 22px;
        }

        .stats-grid {
            gap: 10px;
        }

        .stat-item {
            padding: 12px;
        }

        .stat-number {
            font-size: 20px;
        }
    }
</style>

<div class="dashboard-container">
    <div class="dashboard-card">
        <div class="logo-wrapper">
            <div class="logo-circle">
                <i class="fas fa-briefcase"></i>
            </div>
        </div>

        <h1>
            <span class="gradient-text">WORKFORCE</span>
            <span style="color: #1f2d3d;"> SAUDIA</span>
        </h1>

        <div class="subtitle">
            <i class="fas fa-id-card"></i>
            <span>سجل تجاري: 7002891070</span>
        </div>

        <!-- إحصائيات توضيحية -->
        <div class="stats-grid">
            <div class="stat-item">
                <i class="fas fa-user-check stat-number" style="font-size: 24px;"></i>
                <span class="stat-label">عمالة مدربة</span>
            </div>
            <div class="stat-item">
                <i class="fas fa-building stat-number" style="font-size: 24px;"></i>
                <span class="stat-label">شركاء نجاح</span>
            </div>
            <div class="stat-item">
                <i class="fas fa-clock stat-number" style="font-size: 24px;"></i>
                <span class="stat-label">خدمة 24/7</span>
            </div>
            <div class="stat-item">
                <i class="fas fa-star stat-number" style="font-size: 24px;"></i>
                <span class="stat-label">رضاء العملاء</span>
            </div>
        </div>

        <a href="{{ url_for('login') }}" class="btn-custom">
            <i class="fas fa-sign-in-alt"></i>
            <span>تسجيل الدخول إلى لوحة التحكم</span>
        </a>

<!--        <div class="security-badge">-->
<!--            <div><i class="fas fa-shield-alt"></i> نظام آمن</div>-->
<!--            <div><i class="fas fa-lock"></i> تشفير بيانات</div>-->
<!--            <div><i class="fas fa-headset"></i> دعم فني</div>-->
<!--        </div>-->
    </div>
</div>

{% endblock %}
